<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>即梦收藏导出</title>
  <style>
    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --text: #1c1917;
      --muted: #78716c;
      --line: #e7e5e4;
      --line-strong: #d6d3d1;
      --primary: #1c1917;
      --primary-hover: #0c0a09;
      --error-bg: #fef2f2;
      --error-text: #b91c1c;
      --info-bg: #f5f5f4;
      --info-text: #44403c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 360px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      font-size: 14px;
      padding: 18px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 18px;
    }

    .header {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border: 1px solid var(--line);
      object-fit: cover;
      background: var(--surface);
    }

    .title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0;
      text-transform: none;
    }

    .value-prop {
      font-size: 14px;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 16px;
    }

    .error,
    .info {
      padding: 12px 13px;
      font-size: 14px;
      line-height: 1.4;
      margin-bottom: 12px;
      display: none;
    }

    .error {
      background: var(--error-bg);
      color: var(--error-text);
    }

    .info {
      background: var(--info-bg);
      color: var(--info-text);
    }

    .error.active,
    .info.active {
      display: block;
    }

    .status {
      border: 1px solid var(--line);
      padding: 12px;
      margin-bottom: 12px;
      background: var(--surface);
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 30px;
      font-size: 14px;
      border-bottom: 1px dashed #f0efed;
    }

    .status-item:last-child {
      border-bottom: none;
    }

    .status-label {
      color: var(--muted);
    }

    .status-value {
      color: var(--text);
      font-weight: 500;
      text-align: right;
      margin-left: 10px;
    }

    .progress {
      border: 1px solid var(--line);
      padding: 12px;
      margin-bottom: 12px;
      background: var(--surface);
      display: none;
    }

    .progress.active {
      display: block;
    }

    .progress-bar {
      height: 7px;
      background: #f0efed;
      overflow: hidden;
      margin-bottom: 7px;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: var(--primary);
      transition: width 0.3s ease;
    }

    .progress-text {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
      text-align: center;
    }

    .actions {
      display: grid;
      gap: 8px;
    }

    .btn {
      appearance: none;
      border: 1px solid transparent;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.2;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: var(--surface);
      border-color: var(--line);
      color: var(--text);
    }

    .btn-secondary:hover:not(:disabled) {
      border-color: var(--line-strong);
      background: #fcfcfb;
    }

    .btn:disabled {
      opacity: 0.62;
      cursor: not-allowed;
    }

    .footnote {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="header">
      <img class="logo" src="/logo.jpg" alt="即梦收藏导出 Logo">
      <div>
        <div class="title">即梦收藏导出</div>
        <div class="subtitle">One Click Export</div>
      </div>
    </div>

    <p class="value-prop">把收藏内容一键沉淀为可复用资产：完整素材包或可检索 CSV，方便团队归档与二次创作。</p>

    <div class="error" id="error"></div>
    <div class="info" id="info"></div>

    <section class="status" id="status">
      <div class="status-item">
        <span class="status-label">页面状态</span>
        <span class="status-value" id="pageStatus">-</span>
      </div>
      <div class="status-item">
        <span class="status-label">可导出数量</span>
        <span class="status-value" id="itemCount">-</span>
      </div>
    </section>

    <div class="progress" id="progress">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">准备中...</div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="exportBtn">导出全部素材包</button>
      <button class="btn btn-secondary" id="exportCsvBtn">仅导出 CSV（prompt + detail_url）</button>
      <button class="btn btn-secondary" id="collectBtn">刷新收藏列表</button>
    </div>

    <p class="footnote">导出文件仅保存在本地设备，不上传第三方服务。</p>
  </main>

  <script type="module" src="popup.js"></script>
</body>
</html>
