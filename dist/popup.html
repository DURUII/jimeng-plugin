<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>即梦收藏导出</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e0e0e0;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 14px;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 12px;
      color: #666;
    }

    .status {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .status-item:last-child {
      margin-bottom: 0;
    }

    .status-label {
      color: #666;
    }

    .status-value {
      font-weight: 500;
    }

    .progress {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      display: none;
    }

    .progress.active {
      display: block;
    }

    .progress-bar {
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 12px;
      color: #666;
      text-align: center;
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: white;
      color: #333;
      border: 1px solid #e0e0e0;
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: #f5f5f5;
    }

    .error {
      background: #fee2e2;
      color: #dc2626;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }

    .error.active {
      display: block;
    }

    .info {
      background: #f0f9ff;
      color: #0369a1;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }

    .info.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">即</div>
    <div>
      <div class="title">即梦收藏导出</div>
      <div class="subtitle">导出喜欢的 AIGC 图片</div>
    </div>
  </div>

  <div class="error" id="error"></div>
  <div class="info" id="info"></div>

  <div class="status" id="status">
    <div class="status-item">
      <span class="status-label">页面状态</span>
      <span class="status-value" id="pageStatus">-</span>
    </div>
    <div class="status-item">
      <span class="status-label">可导出项目</span>
      <span class="status-value" id="itemCount">-</span>
    </div>
    <div class="status-item">
      <span class="status-label">后台连接</span>
      <span class="status-value" id="bgStatus">-</span>
    </div>
    <div class="status-item">
      <span class="status-label">页面连接</span>
      <span class="status-value" id="contentStatus">-</span>
    </div>
  </div>

  <div class="progress" id="progress">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    <div class="progress-text" id="progressText">准备中...</div>
  </div>

  <button class="btn btn-primary" id="exportBtn">导出所有收藏</button>
  <button class="btn btn-secondary" id="exportCsvBtn">仅导出 CSV（prompt + detail_url）</button>
  <button class="btn btn-secondary" id="collectBtn">重新收集</button>
  <button class="btn btn-secondary" id="heartbeatBtn">心跳检测</button>

  <script type="module" src="popup.js"></script>
</body>
</html>
